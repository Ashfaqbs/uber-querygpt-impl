services:

  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  weaviate-init:
    image: alpine/curl:latest
    container_name: weaviate-init
    depends_on:
      weaviate:
        condition: service_healthy
    volumes:
      - ./init/init_collections.sh:/init_collections.sh
    command: ["sh", "/init_collections.sh"]
    restart: "no"

volumes:
  weaviate_data:
